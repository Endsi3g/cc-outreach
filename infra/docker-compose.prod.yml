version: '3.9'

# ===========================================
# CC-Outreach - Production Docker Compose
# ===========================================
# Optimisé pour le déploiement sur VPS ou local
# Pour Railway/Render, utilisez les configurations individuelles

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cc-outreach-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cc_outreach}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cc-outreach-network

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    container_name: cc-outreach-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cc-outreach-network

  # API Service
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: cc-outreach-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GMAIL_SCOPES: ${GMAIL_SCOPES:-https://mail.google.com/}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.1}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-60000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      GMAIL_DAILY_QUOTA: ${GMAIL_DAILY_QUOTA:-450}
      CRAWL_DELAY_MS: ${CRAWL_DELAY_MS:-1500}
      GOOGLE_MAPS_DELAY_MS: ${GOOGLE_MAPS_DELAY_MS:-2000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cc-outreach-network

  # Worker Service
  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: cc-outreach-worker
    restart: unless-stopped
    ports:
      - "${WORKER_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GMAIL_SCOPES: ${GMAIL_SCOPES:-https://mail.google.com/}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.1}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-60000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - cc-outreach-network

  # Scheduler Service
  scheduler:
    build:
      context: ..
      dockerfile: apps/scheduler/Dockerfile
    container_name: cc-outreach-scheduler
    restart: unless-stopped
    ports:
      - "${SCHEDULER_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cc-outreach-network

  # Dashboard (Next.js)
  dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    container_name: cc-outreach-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3003}:3001"
    environment:
      NODE_ENV: production
      API_URL: ${API_URL:-http://api:3000}
    depends_on:
      - api
    networks:
      - cc-outreach-network

volumes:
  postgres_data:
  redis_data:

networks:
  cc-outreach-network:
    driver: bridge